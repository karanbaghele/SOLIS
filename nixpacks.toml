[phases.setup]
# Force Railway/Nixpacks to use modern runtimes that match backend pins.
nixPkgs = ["python311", "nodejs_20", "yarn"]

[phases.install]
cmds = [
  "cd backend && python -m pip install --upgrade pip",
  "cd backend && pip install -r requirements.txt",
  "cd frontend && yarn install",
]

[phases.build]
cmds = [
  "cd frontend && yarn build",
  "rm -rf backend/static",
  "mkdir -p backend/static",
  "cp -R frontend/build/* backend/static/",
]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000}"

